<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WBG Intelligence Local</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>WBG Intelligence</h1>
        <p>本地宽禁带半导体产业情报数据库</p>
      </div>
      <div class="status-pill" id="currentTask">Loading</div>
    </header>

    <main>
      <section class="stats" id="stats"></section>

      <section class="layout">
        <aside class="sidebar">
          <div class="panel">
            <h2>公司检索</h2>
            <input id="search" type="search" placeholder="公司名 / 中文名 / Canonical ID" />
            <div class="filters">
              <button data-material="">全部</button>
              <button data-material="SiC">SiC</button>
              <button data-material="GaN">GaN</button>
              <button data-material="Ga2O3">Ga2O3</button>
            </div>
          </div>
          <div class="company-list" id="companyList"></div>
        </aside>

        <section class="content">
          <article class="panel" id="companyDetail">
            <h2>选择一家公司</h2>
            <p class="muted">左侧检索公司后，这里会显示公司主数据、产品化能力和财务事实。</p>
          </article>

          <article class="panel">
            <h2>治理风险</h2>
            <div id="governanceIssues"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
